apiVersion: v1
kind: Namespace
metadata:
  name: medicine-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: medicine-platform
  namespace: medicine-platform
automountServiceAccountToken: false
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: medicine-db
  namespace: medicine-platform
spec:
  instances: 1
  bootstrap:
    initdb:
      database: medicine
      owner: medicine
      secret:
        name: medicine-db-auth
  storage:
    storageClass: local-path
    size: 6Gi
  resources:
    requests:
      cpu: 150m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: medicine-platform
spec:
  clusterIP: None
  selector:
    app: rabbitmq
  ports:
    - {name: amqp, port: 5672, targetPort: amqp}
    - {name: management, port: 15672, targetPort: management}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: medicine-platform
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels: {app: rabbitmq}
  template:
    metadata:
      labels: {app: rabbitmq}
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:4-management-alpine
          ports:
            - {name: amqp, containerPort: 5672}
            - {name: management, containerPort: 15672}
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom: {secretKeyRef: {name: medicine-runtime, key: RABBITMQ_USER}}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom: {secretKeyRef: {name: medicine-runtime, key: RABBITMQ_PASSWORD}}
          readinessProbe:
            exec: {command: [rabbitmq-diagnostics, -q, ping]}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec: {command: [rabbitmq-diagnostics, -q, ping]}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 768Mi}
          volumeMounts:
            - {name: data, mountPath: /var/lib/rabbitmq}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources: {requests: {storage: 1Gi}}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: medicine-platform
spec:
  clusterIP: None
  selector:
    app: minio
  ports:
    - {name: api, port: 9000, targetPort: api}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: medicine-platform
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels: {app: minio}
  template:
    metadata:
      labels: {app: minio}
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: [server, /data]
          ports:
            - {name: api, containerPort: 9000}
          env:
            - name: MINIO_ROOT_USER
              valueFrom: {secretKeyRef: {name: medicine-runtime, key: MINIO_USER}}
            - name: MINIO_ROOT_PASSWORD
              valueFrom: {secretKeyRef: {name: medicine-runtime, key: MINIO_PASSWORD}}
          readinessProbe:
            httpGet: {path: /minio/health/ready, port: api}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /minio/health/live, port: api}
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
          volumeMounts:
            - {name: data, mountPath: /data}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources: {requests: {storage: 8Gi}}
